<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        //print
        console.log("Hello, World!");//print di colsole jadi gak akan tertampil di halaman web
        document.write("Mawar <br> ");// gunakan ini jika ingin menampilkan teks di halaman web
        //variabel
        let x = "Putri";
        x = "Dewi"; // bisa terubah nilainya
        document.write(x);
        // console
        alert("Selamat datang di website saya!");
        //function adalah kunci utama(method,class,module,constuctor)
        //Built-in function(String)
        var nama = "Putri Dewi";
        console.log(nama.charAt(2)); //mengambil karakter pada index ke-5
        //(Math)
        var bil = Math.random();
        console.log(bil);
        //User-defined function
        //function declaration
        function jumlahDuaBilanngan(a, b) {
            var total;
            total = a + b;
            return total;
        }
        //function expression
        var jumlahDuaBilanngan2 = function (a, b) {
            var total;
            total = a + b;
            return total;
        }
        alert(jumlahDuaBilanngan(5, 10));
        alert(jumlahDuaBilanngan2(7, 3));

        function VolumekeduaKubus(p, r) {
            var volume1 = p * p * p;
            var volume2 = r * r * r;

            var total;
            total = volume1 + volume2;
            return total;
        }
        console.log(VolumekeduaKubus(3, 4));// (3,4) argument
        //parameter(terdapat didalam kurung function)
        //argumen(nilai yang diberikan keparameter saat fungsi dipanggil)
        function tambah1(a, b) {
            return a + b;
        }
        function kali(a, b) {
            return a * b;
        }
        var a = parseInt(prompt("Masukkan angka pertama:"));
        var b = parseInt(prompt("Masukkan angka kedua:"));
        var hasil = tambah1(a, b);
        console.log(hasil);
        var hasilKali = kali(tambah1(1, 2), tambah1(3, 4));
        console.log(hasilKali);
        //arguments (nilai array yang tersedia didalam fungsi)
        function tammbah() {
            var hasil = 0;
            for (var i = 0; i < arguments.length; i++) {
                hasil += arguments[i];
            }
            return hasil;
        }
        var coba = tammbah(1, 2, 3, 4);
        console.log(coba);
        //==========================================================================================================
        //refactoring (mengubah kode yang sudah ada untuk meningkatkan kualitasnya tanpa mengubah fungsionalitasnya)
        //==========================================================================================================
        // awalnya

        //function VolumekeduaKubus(p, r) {
        //    var volume1 = p * p * p;
        //    var volume2 = r * r * r;

        //    var total;
        //    total = volume1 + volume2;
        //   return total;
        // }

        //akhirnya
        function VolumekeduaKubus2(p, r) {
            return (p * p * p) + (r * r * r);
        }
        console.log(VolumekeduaKubus2(3, 4));
        //==========================================================================================================
    </script>

</body>

</html>
